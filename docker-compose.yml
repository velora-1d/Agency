services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kantor-digital-app
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    networks:
      - agency-network

  db:
    image: postgres:15-alpine
    container_name: kantor-digital-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kantor_digital}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agency-network

networks:
  agency-network:
    driver: bridge

volumes:
  pgdata:
